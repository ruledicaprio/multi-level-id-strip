name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config clang libclang-dev

      - uses: Swatinem/rust-cache@v2

      # Small (~12 MB total) and the URLs/checksums are fixed, so this runs on
      # every push rather than being workflow_dispatch-gated like native-llm's
      # ~1 GB GGUF download below.
      - name: Cache OCR .rten models
        uses: actions/cache@v5
        with:
          path: |
            text-detection.rten
            text-recognition.rten
          key: ocrs-rten-models-v1

      - name: Download + checksum-verify the OCR .rten models
        run: |
          for f in text-detection.rten text-recognition.rten; do
            if [ ! -f "$f" ]; then
              curl -fL --retry 3 -o "$f" "https://ocrs-models.s3-accelerate.amazonaws.com/$f"
            fi
          done
          echo "f15cfb56bd02c4bf478a20343986504a1f01e1665c2b3a0ad66340f054b1b5ca  text-detection.rten" | sha256sum -c -
          echo "e484866d4cce403175bd8d00b128feb08ab42e208de30e42cd9889d8f1735a6e  text-recognition.rten" | sha256sum -c -

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets

      - name: Test (workspace)
        run: cargo test --workspace

      # Not covered by the default-features workspace test above: the
      # vendor-gated signing/keygen path (issuer binary + its round-trip
      # test) is opt-in on purpose, so it needs its own explicit run.
      - name: Test synthpass-license vendor (signing/keygen) feature
        run: cargo test -p synthpass-license --features vendor

      # These two steps are *smoke* tests — they assert the OCR stage runs and
      # the pipeline reaches a terminal result, never Tier-1 MRZ accuracy — but
      # they run real rten inference on full-size sample images, which dominated
      # the job at ~24 min. The cause was debug-mode rten: a single general pass
      # is ~5 min on CI's 2-core runner in debug vs ~2 s in release. Running the
      # two steps in `--release` collapses execution to seconds (measured: e2e
      # 2.0 s, pipeline smoke 10.8 s); the one-time release build is cached by
      # `Swatinem/rust-cache`. `SYNTHPASS_OCR_MAX_PASSES=1` is complementary: the
      # format test's PNG/WebP re-encodes miss Tier-1 and would otherwise run the
      # retry loop these smoke tests don't need (the retry/preprocess paths are
      # covered by the fast `preprocess` unit tests in `cargo test --workspace`).
      - name: Native OCR e2e test (real ocrs/rten models)
        env:
          SYNTHPASS_OCR_MAX_PASSES: "1"
        run: cargo test -p synthpass-ocr --release --test native_ocr_e2e -- --ignored

      - name: Native-rust OCR pipeline smoke test (real ocrs/rten models)
        env:
          SYNTHPASS_OCR_MAX_PASSES: "1"
        run: cargo test -p synthpass-pipeline --release --test rust_ocr_smoke -- --ignored

      # M4 regression gate: measures the Tier-1 (checksum-valid MRZ) hit rate
      # over a fixed, deterministic synthetic corpus and fails the build if it
      # drops meaningfully below the honestly-measured floor. 30% is set well
      # under the ~55% measured locally over a 100-seed sample (see
      # docs/ROADMAP.md and PR #30) — the margin absorbs cross-platform
      # floating-point variance in OCR inference between this runner and the
      # machine the number was measured on, so the gate catches real
      # regressions without being flaky. A 50-seed corpus keeps this step's
      # runtime bounded (sequential by design — see synthpass-bench.rs's
      # module docs for why parallelizing these checks corrupts the
      # measurement instead of just speeding it up).
      - name: M4 Tier-1 hit-rate gate (synthpass-bench, clean profile)
        run: |
          cargo run -p synthpass-bench --release --bin synthpass-bench -- \
            --count 50 --seed 0 --profile clean --min-hit-rate 0.30 --out bench-report.json

      - name: Check the OCR backend feature builds alone
        run: cargo check -p synthpass-pipeline --no-default-features --features inferer-native,ocr-native-rust

      # synthpass-license's default build (no `vendor`) must stay signing-free —
      # it's what synthpass-cli/synthpass-serve actually ship; `vendor` (the issuer
      # binary's signing/keygen code) is checked separately so a break in
      # either doesn't hide behind the other.
      - name: Check synthpass-license feature combinations (each must build alone)
        run: |
          cargo check -p synthpass-license
          cargo check -p synthpass-license --features vendor

  # Cross-platform proof: `synthpass-ocr` (ocrs/rten) builds and tests here with
  # no system OCR libraries at all — the "zero Docker/Python, genuinely pure
  # Rust" claim, exercised on macOS on every push.
  rust-portable:
    name: Rust (${{ matrix.os }}, default members)
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cmake
        run: brew install cmake
      - uses: Swatinem/rust-cache@v2
      - name: Test default members (includes synthpass-ocr)
        run: cargo test

  # Real-model native LLM checks: downloads the ~1 GB GGUF, so this is opt-in
  # (workflow_dispatch) rather than on every push/PR: the e2e smoke test plus
  # the field-accuracy parity harness over samples/*.
  native-llm:
    name: Native LLM (real model, opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang libclang-dev
      - uses: Swatinem/rust-cache@v2

      - name: Download + checksum-verify the GGUF model
        run: |
          MODEL_URL="https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf"
          MODEL_SHA256="6a1a2eb6d15622bf3c96857206351ba97e1af16c30d7a74ee38970e434e9407e"
          curl -fL --retry 3 -o qwen2.5-1.5b-instruct-q4_k_m.gguf "$MODEL_URL"
          echo "$MODEL_SHA256  qwen2.5-1.5b-instruct-q4_k_m.gguf" | sha256sum -c -

      - name: Native LLM e2e smoke test
        run: cargo test -p synthpass-llm --test native_llm_e2e -- --ignored

      - name: Parity harness (field accuracy over samples/*)
        run: cargo test -p synthpass-llm --test parity -- --ignored --nocapture

  # Coverage-guided fuzzing of the mrz ingest surface (find_and_parse,
  # parse_td1/td2/td3). Opt-in like native-llm above: needs nightly + a
  # non-deterministic bounded run time, which would be a poor fit for a
  # required PR check (see docs/ARCHITECTURE.md §10 / v0.9.0). The always-on
  # regression net (never-panics proptest suite) runs in the `rust` job above
  # as part of `cargo test --workspace`.
  fuzz:
    name: Fuzz mrz (cargo-fuzz, opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz mrz_find_and_parse (60s)
        run: cargo fuzz run mrz_find_and_parse -- -max_total_time=60

      - name: Fuzz mrz_parse_td (60s)
        run: cargo fuzz run mrz_parse_td -- -max_total_time=60

  # Static x86_64-unknown-linux-musl release build — the "copy one file to an
  # air-gapped machine" artifact (see docs/ARCHITECTURE.md §10). New,
  # C++-heavy cross-compile infra as of v1.0.0, so this starts opt-in like
  # native-llm/fuzz above; promote to a required check once it's proven
  # stable over a few runs (tracked as a v1.0.1 fast-follow, see CHANGELOG).
  rust-musl:
    name: Rust (musl static release, opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: "0.13.0"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl

      - name: Install Zig (pinned)
        run: |
          curl -fL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          sudo tar -xJf /tmp/zig.tar.xz -C /opt
          sudo ln -s "/opt/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig
          zig version

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache OCR .rten models
        uses: actions/cache@v5
        with:
          path: |
            text-detection.rten
            text-recognition.rten
          key: ocrs-rten-models-v1

      - name: Download + checksum-verify the OCR .rten models
        run: |
          for f in text-detection.rten text-recognition.rten; do
            if [ ! -f "$f" ]; then
              curl -fL --retry 3 -o "$f" "https://ocrs-models.s3-accelerate.amazonaws.com/$f"
            fi
          done
          echo "f15cfb56bd02c4bf478a20343986504a1f01e1665c2b3a0ad66340f054b1b5ca  text-detection.rten" | sha256sum -c -
          echo "e484866d4cce403175bd8d00b128feb08ab42e208de30e42cd9889d8f1735a6e  text-recognition.rten" | sha256sum -c -

      # `inferer-native`/`ocr-native-rust` are synthpass-pipeline features, not
      # synthpass-cli/synthpass-serve features — they're already on by default via
      # synthpass-pipeline's own `default = ["inferer-native", "ocr-native-rust"]`
      # (a path dependency's default features aren't affected by
      # `--no-default-features` on the top-level packages being built), so
      # only `ocr-embedded` needs to be requested explicitly here.
      - name: Build static musl release binaries (models embedded)
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl -p synthpass-cli -p synthpass-serve --features ocr-embedded

      - name: Confirm the binaries are statically linked
        run: |
          file target/x86_64-unknown-linux-musl/release/synthpass | grep -q 'statically linked'
          file target/x86_64-unknown-linux-musl/release/synthpass-serve | grep -q 'statically linked'

      # `synthpass doctor`'s exit code also gates on the Tier-2 GGUF model, which
      # this job deliberately doesn't download (that ~1GB fetch is the
      # separate opt-in `native-llm` job's concern, not this one's) — so
      # assert on the OCR-specific success line rather than doctor's overall
      # exit code, which correctly stays non-zero here regardless.
      - name: Smoke test in a minimal Alpine container (musl libc parity)
        run: |
          docker run --rm -v "$PWD/target/x86_64-unknown-linux-musl/release:/bin2:ro" alpine:3.20 sh -c "
            set -e
            /bin2/synthpass fingerprint
            SYNTHPASS_LICENSE_SKIP=1 /bin2/synthpass doctor || true
          " | tee /tmp/doctor-output.txt
          grep -q 'OCR (rust) detection+recognition models embedded in binary' /tmp/doctor-output.txt

      - uses: actions/upload-artifact@v4
        with:
          name: synthpass-musl-x86_64
          path: |
            target/x86_64-unknown-linux-musl/release/synthpass
            target/x86_64-unknown-linux-musl/release/synthpass-serve
