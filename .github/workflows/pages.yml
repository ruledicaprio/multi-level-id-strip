name: Deploy MRZ demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Run mrz crate tests
        run: cargo test -p mrz

      - name: Build WASM package
        run: wasm-pack build crates/mrz-wasm --target web --release --no-typescript

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp -r web/* _site/
          cp crates/mrz-wasm/pkg/mrz_wasm.js crates/mrz-wasm/pkg/mrz_wasm_bg.wasm _site/pkg/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
