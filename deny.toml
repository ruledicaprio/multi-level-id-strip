# cargo-deny configuration — run: cargo install cargo-deny && cargo deny check
# Fails the build on non-allowed licenses, known advisories, or untrusted sources.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
