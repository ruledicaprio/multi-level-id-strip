syntax = "proto3";

// Contract between the Rust pipeline (Tier 2 client, tonic+prost) and the
// persistent Python inference sidecar (grpcio server, llama.cpp + Qwen GGUF).
// This file is the single source of truth for both sides.
package mlis.inferer;

service Inferer {
  // Extract structured fields from OCR Markdown (Tier 2 fallback, used only
  // when no checksum-valid MRZ exists). The model is loaded once and kept warm.
  rpc Extract(ExtractRequest) returns (ExtractResponse);
  // Liveness/readiness: is the model loaded and ready to serve?
  rpc Health(HealthRequest) returns (HealthReply);
}

message ExtractRequest {
  // OCR Markdown for the document.
  string markdown = 1;
  // Optional cropped region-of-interest image bytes (PNG/JPEG). Empty if none.
  bytes image_roi = 2;
}

// Mirrors mlis-core::Extraction. Fields are proto3 `optional` so an absent value
// (the model found nothing) is distinct from an empty string. `raw_json` carries
// the model's original validated JSON as an escape hatch / for debugging.
message ExtractResponse {
  optional string document_type = 1;
  optional string issuing_country = 2;
  optional string document_number = 3;
  optional string surname = 4;
  optional string given_names = 5;
  optional string nationality = 6;
  optional string date_of_birth = 7;
  optional string sex = 8;
  optional string date_of_expiry = 9;
  optional string personal_number = 10;
  optional string mrz_line = 11;
  string raw_json = 12;
}

message HealthRequest {}

message HealthReply {
  bool model_loaded = 1;
  string model_path = 2;
}
